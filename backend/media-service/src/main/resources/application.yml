server:
  port: ${SERVER_PORT:8097}
spring:
  application.name: media-service
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/autoassist}
    username: ${DATABASE_USERNAME:autoassist}
    password: ${DATABASE_PASSWORD:autoassist}
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
  flyway.enabled: true
  security.oauth2.resourceserver.jwt.issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/autoassist}
minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:autoassist-media}
management.endpoints.web.exposure.include: health,info
