name: autoassist-3d

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoassist-postgres
    restart: unless-stopped
    env_file:
      - ../config/env/docker/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoassist -d autoassist"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: autoassist-minio
    restart: unless-stopped
    env_file:
      - ../config/env/docker/minio.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: autoassist-minio-init
    profiles:
      - init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/autoassist-media;
      exit 0;
      "

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: autoassist-keycloak
    restart: unless-stopped
    env_file:
      - ../config/env/docker/keycloak.env
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/autoassist-realm.json:/opt/keycloak/data/import/autoassist-realm.json:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '200 OK'"
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:1.27-alpine
    container_name: autoassist-nginx
    restart: unless-stopped
    depends_on:
      - keycloak
    ports:
      - "80:80"
    volumes:
      - ../runtime/nginx/html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  minio_data:
  keycloak_data:
